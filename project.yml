name: IPABot
options:
  bundleIdPrefix: com.dylankirkgirg
  deploymentTarget:
    iOS: "16.0"
targets:
  IPABot:
    type: application
    platform: iOS
    sources:
      - IPABot/Sources
      - IPABot/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylankirkgirg.ipabot.native
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: IPABot
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Generated/IPABot-Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes: [ipabot]
            CFBundleURLName: com.dylankirkgirg.ipabot.native
        NSSupportsLiveActivities: true
    dependencies:
      - target: IPABotShare
        embed: true
      - target: IPABotWidgets
        embed: true

  IPABotShare:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylankirkgirg.ipabot.native.share
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "Sign with IPABot"
    info:
      path: Generated/IPABotShare-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true

  IPABotWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - Widgets
      - path: IPABot/Sources/InjectActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylankirkgirg.ipabot.native.widgets
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "IPABot Activity"
    info:
      path: Generated/IPABotWidgets-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

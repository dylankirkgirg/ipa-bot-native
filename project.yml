name: IPABot
options:
  bundleIdPrefix: com.dylankirkgirg
  deploymentTarget:
    iOS: "16.0"
targets:
  IPABot:
    type: application
    platform: iOS
    sources:
      - IPABot/Sources
    resources:
      - IPABot/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylankirkgirg.ipabot.native
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: IPABot
